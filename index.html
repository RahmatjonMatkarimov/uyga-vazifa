<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>anoniym page</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen flex items-center justify-center bg-gradient-to-br from-purple-600 to-blue-500 font-sans">
  <div class="bg-white rounded-2xl shadow-2xl p-8 w-full max-w-md text-center">
    <div class="flex flex-col gap-4">
      <button onclick="getLocation()"
        class="px-5 py-3 rounded-xl bg-blue-600 text-white font-medium hover:bg-blue-700 shadow-md transition transform hover:-translate-y-1">
        🌍 Location
      </button>
      <button onclick="cam()"
        class="px-5 py-3 rounded-xl bg-yellow-400 text-gray-900 font-medium hover:bg-yellow-500 shadow-md transition transform hover:-translate-y-1">
        📷 Camera
      </button>
      <button onclick="battery()"
        class="px-5 py-3 rounded-xl bg-green-500 text-white font-medium hover:bg-green-600 shadow-md transition transform hover:-translate-y-1">
        🔋 Battery
      </button>
    </div>
    <div id="res" class="mt-4 text-gray-600 font-medium"></div>
    <video id="camEl" autoplay playsinline class="mt-5 rounded-xl shadow-lg w-full max-h-64 object-cover"></video>
  </div>

  <script>
    const result = document.getElementById("res")
    function getLocation() {
        navigator.geolocation.getCurrentPosition(function (position) {
          result.innerHTML =
            "Latitude: " + position.coords.latitude + "<br>Longitude: " + position.coords.longitude
        })
    }

    function cam() {
      navigator.mediaDevices.getUserMedia({ video: true })
        .then(stream => {
          document.getElementById("camEl").srcObject = stream;
        })
        .catch(err => {
          result.innerHTML = "Camera access denied.";
        });
    }

    function battery() {
      navigator.getBattery().then(function (battery) {
        result.innerHTML =
          "Battery: " + Math.round(battery.level * 100) + "%";
      });
    }
  </script>
</body>
</html>
